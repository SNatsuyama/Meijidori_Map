<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>明治通り沿線情報マップ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }
      #container {
        display: flex;
        height: 100vh;
        flex-direction: row;
      }
      #map {
        flex: 1;
        height: 100%;
      }
      #panel {
        width: 290px;
        background-color: #ffffff;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
        z-index: 10;
      }
      h3 {
        margin-top: 0;
        border-bottom: 2px solid #33c;
        padding-bottom: 8px;
        font-size: 16px;
      }
      .control-group {
        margin-bottom: 20px;
      }
      .control-item {
        margin: 8px 0;
        display: flex;
        align-items: center;
      }
      .control-item input {
        margin-right: 10px;
        width: 16px;
        height: 16px;
      }
      label {
        font-size: 14px;
        cursor: pointer;
      }
      @media (max-width: 768px) {
        #container {
          flex-direction: column-reverse;
        }
        #panel {
          width: 100%;
          height: 42vh;
        }
        #map {
          height: 58vh;
        }
      }
    </style>
    <!-- Google Maps JavaScript API の読み込み -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAtS9PympKieGJ8LvpIbqFn0A8l0AkJ7Qc&callback=initMap&v=weekly&libraries=marker" defer></script>
  </head>
  <body>
    <div id="container">
      <div id="panel">
        <h3>沿線フィルターマップ</h3>
        
        <!-- 【グループ2：エリア】（どれか一つでもチェックされていれば表示：OR） -->
        <div class="control-group">
          <strong>2. 所在区（エリア）</strong>
          <div class="control-item">
            <input type="checkbox" id="tag-minato" checked />
            <label for="tag-minato">港区</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-shibuya" checked />
            <label for="tag-shibuya">渋谷区</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-shinjuku" checked />
            <label for="tag-shinjuku">新宿区</label>
          </div>
        </div>

        <!-- 【グループ1：スポット種別】（どれか一つでもチェックされていれば表示：OR） -->
        <div class="control-group">
          <strong>1. スポット種別</strong>
          <div class="control-item">
            <input type="checkbox" id="tag-photo" checked />
            <label for="tag-photo">フォトスポット</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-intersection" checked />
            <label for="tag-intersection">交差点</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-crossing" checked />
            <label for="tag-crossing">交差道路</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-restaurant" checked />
            <label for="tag-restaurant">おすすめ飲食店</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-station" checked />
            <label for="tag-station">周辺駅</label>
          </div>
        </div>

        <!-- 地図基本ライン表示 -->
        <div class="control-group">
          <strong>基本インフラ</strong>
          <div class="control-item">
            <input type="checkbox" id="toggle-meiji-line" checked />
            <label for="toggle-meiji-line">明治通り</label>
          </div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <script>
      let map;
      let infoWindow;

      // 制御ロジックの判定用オブジェクト
      const mapItems = []; 
      const staticLayers = {}; 

      async function initMap() {
        const Map = google.maps.Map;
        const AdvancedMarkerElement = google.maps.marker.AdvancedMarkerElement;
        const PinElement = google.maps.marker.PinElement;
        const InfoWindow = google.maps.InfoWindow;

        infoWindow = new InfoWindow();

        map = new Map(document.getElementById("map"), {
          center: { lat: 35.675, lng: 139.708 }, // 港区・渋谷区・新宿区が収まる中心
          zoom: 13,
          mapId: "fb56929676bfd00eebae2174",
          mapTypeControl: false,
        });

        // ==========================================
        // A. 自治体ポリゴンデータの追加
        // ==========================================
        // (1) 港区
        const minatoPoly = new google.maps.Polygon({
          paths: [
            { lat: 35.655, lng: 139.710 }, { lat: 35.655, lng: 139.735 },
            { lat: 35.635, lng: 139.735 }, { lat: 35.635, lng: 139.710 }
          ],
          strokeColor: "#9900FF", strokeOpacity: 0.8, strokeWeight: 2,
          fillColor: "#9900FF", fillOpacity: 0.1
        });
        addClickEvent(minatoPoly, "<h3>港区エリア</h3><p>明治通り天現寺橋周辺エリアです。</p>");
        mapItems.push({ element: minatoPoly, areaTag: "minato", categoryTag: null, isMarker: false });

        // (2) 渋谷区
        const shibuyaPoly = new google.maps.Polygon({
          paths: [
            { lat: 35.680, lng: 139.690 }, { lat: 35.680, lng: 139.715 },
            { lat: 35.650, lng: 139.715 }, { lat: 35.650, lng: 139.690 }
          ],
          strokeColor: "#00FF00", strokeOpacity: 0.8, strokeWeight: 2,
          fillColor: "#00FF00", fillOpacity: 0.1
        });
        addClickEvent(shibuyaPoly, "<h3>渋谷区エリア</h3><p>原宿・渋谷などの人気スポットを含みます。</p>");
        mapItems.push({ element: shibuyaPoly, areaTag: "shibuya", categoryTag: null, isMarker: false });

        // (3) 新宿区
        const shinjukuPoly = new google.maps.Polygon({
          paths: [
            { lat: 35.710, lng: 139.690 }, { lat: 35.710, lng: 139.720 },
            { lat: 35.680, lng: 139.720 }, { lat: 35.680, lng: 139.690 }
          ],
          strokeColor: "#FF9900", strokeOpacity: 0.8, strokeWeight: 2,
          fillColor: "#FF9900", fillOpacity: 0.1
        });
        addClickEvent(shinjukuPoly, "<h3>新宿区エリア</h3><p>新宿駅東口・新大久保周辺です。</p>");
        mapItems.push({ element: shinjukuPoly, areaTag: "shinjuku", categoryTag: null, isMarker: false });


        // ==========================================
        // B. ラインデータの追加（交差道路）
        // ==========================================
        // 甲州街道（「新宿区」の「交差道路」）
        const koshuKaido = new google.maps.Polyline({
          path: [{ lat: 35.6896, lng: 139.6800 }, { lat: 35.6896, lng: 139.7200 }],
          strokeColor: "#0055FF", strokeOpacity: 0.8, strokeWeight: 5,
        });
        addClickEvent(koshuKaido, "<h3>甲州街道（国道20号）</h3><p>新宿三丁目で交差する主要幹線道路です。</p>");
        mapItems.push({ element: koshuKaido, areaTag: "shinjuku", categoryTag: "crossing", isMarker: false });


        // ==========================================
        // C. マーカーデータの追加（ピン・アイコン）
        // ==========================================
        
        // --- 共通アイコン設定 ---
        const pinBlue = new PinElement({ background: "#0055FF", borderColor: "#002288", glyphColor: "#FFFFFF" }); // 交差点用
        const createIcon = (src) => {
          const img = document.createElement("img");
          img.src = src; img.style.width = "32px"; img.style.height = "32px";
          return img;
        };

        // (1) 【交差点】新宿三丁目交差点（新宿区・交差点）
        const m1 = new AdvancedMarkerElement({ position: { lat: 35.6896, lng: 139.7006 }, title: "新宿三丁目交差点", content: pinBlue.element });
        m1.addListener("click", () => { infoWindow.setContent("<h3>新宿三丁目交差点</h3><p>明治通りの要所です。</p>"); infoWindow.open(map, m1); });
        mapItems.push({ element: m1, areaTag: "shinjuku", categoryTag: "intersection", isMarker: true });

        // (2) 【フォト】渋谷・宮下公園（渋谷区・フォトスポット）
        const m2 = new AdvancedMarkerElement({ position: { lat: 35.6698, lng: 139.7049 }, title: "渋谷・宮下公園", content: createIcon("https://maps.google.com/mapfiles/kml/shapes/camera.png") });
        m2.addListener("click", () => { infoWindow.setContent("<h3>宮下公園フォトスポット</h3><p>渋谷区の宮下公園沿い。</p>"); infoWindow.open(map, m2); });
        mapItems.push({ element: m2, areaTag: "shibuya", categoryTag: "photo", isMarker: true });

        // (3) 【おすすめ飲食店】渋谷の有名ハンバーガー店（渋谷区・飲食店）
        const m3 = new AdvancedMarkerElement({ position: { lat: 35.6625, lng: 139.7020 }, title: "おすすめカフェ", content: createIcon("https://maps.google.com/mapfiles/kml/shapes/dining.png") });
        m3.addListener("click", () => { infoWindow.setContent("<h3>明治通り沿いカフェ</h3><p>テラス席から明治通りを眺められる人気の飲食店です。</p>"); infoWindow.open(map, m3); });
        mapItems.push({ element: m3, areaTag: "shibuya", categoryTag: "restaurant", isMarker: true });

        // (4) 【周辺駅】北参道駅（渋谷区・駅）
        const m4 = new AdvancedMarkerElement({ position: { lat: 35.6791, lng: 139.7067 }, title: "北参道駅", content: createIcon("https://maps.google.com/mapfiles/kml/shapes/rail.png") });
        m4.addListener("click", () => { infoWindow.setContent("<h3>北参道駅</h3><p>東京メトロ副都心線の駅です。</p>"); infoWindow.open(map, m4); });
        mapItems.push({ element: m4, areaTag: "shibuya", categoryTag: "station", isMarker: true });


        // ==========================================
        // 基幹インフラ（明治通り本体：これは常に表示）
        // ==========================================
        staticLayers['meiji'] = new google.maps.Polyline({
          path: [
            { lat: 35.6482, lng: 139.7111 }, { lat: 35.6698, lng: 139.7049 },
            { lat: 35.6896, lng: 139.7006 }, { lat: 35.7295, lng: 139.7109 }
          ],
          strokeColor: "#FF0000", strokeOpacity: 1.0, strokeWeight: 6,
          map: map
        });
        addClickEvent(staticLayers['meiji'], "<h3>明治通り</h3>");


        // ==========================================
        // イベント管理
        // ==========================================
        applyUrlParams();
        updateFilter();

        const allFilters = [
          "tag-minato", "tag-shibuya", "tag-shinjuku",
          "tag-photo", "tag-intersection", "tag-crossing", "tag-restaurant", "tag-station"
        ];
        allFilters.forEach(id => {
          document.getElementById(id).addEventListener("change", updateFilter);
        });

        document.getElementById("toggle-meiji-line").addEventListener("change", (e) => {
          staticLayers['meiji'].setMap(e.target.checked ? map : null);
        });
      }

      // ==========================================
      // 【グループ内のOR】×【グループ間のAND】制御ロジック
      // ==========================================
      function updateFilter() {
        // 現在チェックが入っている「エリア（グループ2）」を取得
        const activeAreas = [];
        if (document.getElementById("tag-minato").checked) activeAreas.push("minato");
        if (document.getElementById("tag-shibuya").checked) activeAreas.push("shibuya");
        if (document.getElementById("tag-shinjuku").checked) activeAreas.push("shinjuku");

        // 現在チェックが入っている「スポット（グループ1）」を取得
        const activeCategories = [];
        if (document.getElementById("tag-photo").checked) activeCategories.push("photo");
        if (document.getElementById("tag-intersection").checked) activeCategories.push("intersection");
        if (document.getElementById("tag-crossing").checked) activeCategories.push("crossing");
        if (document.getElementById("tag-restaurant").checked) activeCategories.push("restaurant");
        if (document.getElementById("tag-station").checked) activeCategories.push("station");

        mapItems.forEach(item => {
          // A: エリアフィルタ条件（港区・渋谷区・新宿区のいずれかに一致: OR）
          const areaMatch = !item.areaTag || activeAreas.includes(item.areaTag);
          
          // B: カテゴリフィルタ条件（フォト・交差点・飲食などのいずれかに一致: OR）
          // ※カテゴリ情報を持たないオブジェクト（純粋な区ポリゴンなど）は、常にパスさせます
          const categoryMatch = !item.categoryTag || activeCategories.includes(item.categoryTag);

          // C: エリアとカテゴリは両方を満たす必要がある（AND）
          const shouldShow = areaMatch && categoryMatch;

          // 地図への描写切替
          if (item.isMarker) {
            item.element.map = shouldShow ? map : null;
          } else {
            item.element.setMap(shouldShow ? map : null);
          }
        });
      }

      // ==========================================
      // URLパラメータに応じた初期化
      // ==========================================
      function applyUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const view = urlParams.get('view');

        if (view) {
          // 全トグルを一度オフにする
          const checkboxes = [
            "tag-minato", "tag-shibuya", "tag-shinjuku",
            "tag-photo", "tag-intersection", "tag-crossing", "tag-restaurant", "tag-station"
          ];
          checkboxes.forEach(id => document.getElementById(id).checked = false);

          // パラメータによる振り分け
          if (view === "shibuya") {
            // 渋谷区かつ、すべてのコンテンツをONにする
            document.getElementById("tag-shibuya").checked = true;
            document.getElementById("tag-photo").checked = true;
            document.getElementById("tag-intersection").checked = true;
            document.getElementById("tag-crossing").checked = true;
            document.getElementById("tag-restaurant").checked = true;
            document.getElementById("tag-station").checked = true;
          } else if (view === "restaurant") {
            // すべての区の「おすすめ飲食店」だけをON
            document.getElementById("tag-minato").checked = true;
            document.getElementById("tag-shibuya").checked = true;
            document.getElementById("tag-shinjuku").checked = true;
            document.getElementById("tag-restaurant").checked = true;
          } else if (view === "station") {
            // すべての区の「周辺駅」だけをON
            document.getElementById("tag-minato").checked = true;
            document.getElementById("tag-shibuya").checked = true;
            document.getElementById("tag-shinjuku").checked = true;
            document.getElementById("tag-station").checked = true;
          }
          // 必要に応じてviewパラメータの仕分けパターンをここに書き足せます
        }
      }

      function addClickEvent(overlay, contentString) {
        overlay.addListener("click", (event) => {
          infoWindow.setContent(contentString);
          infoWindow.setPosition(event.latLng);
          infoWindow.open(map);
        });
      }

      window.onload = initMap;
    </script>
  </body>
</html>
