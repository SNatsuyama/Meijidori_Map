<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>明治通り沿線情報マップ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }
      #container {
        display: flex;
        height: 100vh;
        flex-direction: row;
      }
      #map {
        flex: 1;
        height: 100%;
      }
      #panel {
        width: 290px;
        background-color: #ffffff;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
        z-index: 10;
      }
      h3 {
        margin-top: 0;
        border-bottom: 2px solid #33c;
        padding-bottom: 8px;
        font-size: 16px;
      }
      .control-group {
        margin-bottom: 20px;
      }
      .control-item {
        margin: 8px 0;
        display: flex;
        align-items: center;
      }
      .control-item input {
        margin-right: 10px;
        width: 16px;
        height: 16px;
      }
      label {
        font-size: 14px;
        cursor: pointer;
      }
      @media (max-width: 768px) {
        #container {
          flex-direction: column-reverse;
        }
        #panel {
          width: 100%;
          height: 42vh;
        }
        #map {
          height: 58vh;
        }
      }
    </style>
    <!-- Google Maps JavaScript API の読み込み -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAtS9PympKieGJ8LvpIbqFn0A8l0AkJ7Qc&callback=initMap&v=weekly&libraries=marker" defer></script>
  </head>

    <div id="container">
      <div id="panel">
        <h3>沿線フィルターマップ</h3>

            <input type="checkbox" id="tag-minato" checked />

          </div>
          <div class="control-item">

            <input type="checkbox" id="tag-toshima" checked />

          <div class="control-item">

            <label for="tag-kita">北区</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-arakawa" checked />
            <label for="tag-arakawa">荒川区</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-taitou" checked />
            <label for="tag-taitou">台東区</label>

          <div class="control-item">

          <div class="control-item">
            <input type="checkbox" id="tag-koutou" checked />

        </div>

          <strong>1. スポット種別</strong>
          <div class="control-item">
            <input type="checkbox" id="tag-photo" checked />

          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-intersection" checked />

          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-crossing" checked />

          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-restaurant" checked />

          </div>
          <div class="control-item">
            <input type="checkbox" id="tag-station" checked />
            <label for="tag-station">周辺駅</label>
          </div>
        </div>

        <div class="control-group">
          <strong>基本インフラ</strong>
          <div class="control-item">
            <input type="checkbox" id="toggle-meiji-line" checked />
            <label for="toggle-meiji-line">明治通り</label>
          </div>
        </div>
      </div>

      <div id="map"></div>
    </div>

      // ==========================================
      // 【グループ内のOR】×【グループ間のAND】制御ロジック
      // ==========================================
      function updateFilter() {
        // 現在チェックが入っている「エリア（グループ2）」を取得
        const activeAreas = [];
        if (document.getElementById("tag-minato").checked) activeAreas.push("minato");
        if (document.getElementById("tag-shibuya").checked) activeAreas.push("shibuya");
        if (document.getElementById("tag-shinjuku").checked) activeAreas.push("shinjuku");
        if (document.getElementById("tag-toshima").checked) activeAreas.push("toshima");
        if (document.getElementById("tag-kita").checked) activeAreas.push("kita");
        if (document.getElementById("tag-arakawa").checked) activeAreas.push("arakawa");
        if (document.getElementById("tag-taitou").checked) activeAreas.push("taitou");
        if (document.getElementById("tag-sumida").checked) activeAreas.push("sumida");
        if (document.getElementById("tag-koutou").checked) activeAreas.push("koutou");

        // 現在チェックが入っている「スポット（グループ1）」を取得
        const activeCategories = [];
        if (document.getElementById("tag-photo").checked) activeCategories.push("photo");
        if (document.getElementById("tag-intersection").checked) activeCategories.push("intersection");
        if (document.getElementById("tag-crossing").checked) activeCategories.push("crossing");
        if (document.getElementById("tag-restaurant").checked) activeCategories.push("restaurant");
        if (document.getElementById("tag-station").checked) activeCategories.push("station");

        mapItems.forEach(item => {
          // A: エリアフィルタ条件（港区・渋谷区・新宿区のいずれかに一致: OR）
          const areaMatch = !item.areaTag || activeAreas.includes(item.areaTag);
          
          // B: カテゴリフィルタ条件（フォト・交差点・飲食などのいずれかに一致: OR）
          // ※カテゴリ情報を持たないオブジェクト（純粋な区ポリゴンなど）は、常にパスさせます
          const categoryMatch = !item.categoryTag || activeCategories.includes(item.categoryTag);

          // C: エリアとカテゴリは両方を満たす必要がある（AND）
          const shouldShow = areaMatch && categoryMatch;

          // 地図への描写切替
          if (item.isMarker) {
            item.element.map = shouldShow ? map : null;
          } else {
            item.element.setMap(shouldShow ? map : null);
          }
        });
      }

      // ==========================================
      // URLパラメータに応じた初期化
      // ==========================================
      function applyUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const view = urlParams.get('view');

        if (view) {
          // 全トグルを一度オフにする
          const checkboxes = [
            "tag-minato", "tag-shibuya", "tag-shinjuku",
            "tag-photo", "tag-intersection", "tag-crossing", "tag-restaurant", "tag-station"
          ];
          checkboxes.forEach(id => document.getElementById(id).checked = false);

          // パラメータによる振り分け
          if (view === "shibuya") {
            // 渋谷区かつ、すべてのコンテンツをONにする
            document.getElementById("tag-shibuya").checked = true;
            document.getElementById("tag-photo").checked = true;
            document.getElementById("tag-intersection").checked = true;
            document.getElementById("tag-crossing").checked = true;
            document.getElementById("tag-restaurant").checked = true;
            document.getElementById("tag-station").checked = true;
          } else if (view === "restaurant") {
            // すべての区の「おすすめ飲食店」だけをON
            document.getElementById("tag-minato").checked = true;
            document.getElementById("tag-shibuya").checked = true;
            document.getElementById("tag-shinjuku").checked = true;
            document.getElementById("tag-restaurant").checked = true;
          } else if (view === "station") {
            // すべての区の「周辺駅」だけをON
            document.getElementById("tag-minato").checked = true;
            document.getElementById("tag-shibuya").checked = true;
            document.getElementById("tag-shinjuku").checked = true;
            document.getElementById("tag-station").checked = true;
          }
          // 必要に応じてviewパラメータの仕分けパターンをここに書き足せます
        }
      }

      function addClickEvent(overlay, contentString) {
        overlay.addListener("click", (event) => {
          infoWindow.setContent(contentString);
          infoWindow.setPosition(event.latLng);
          infoWindow.open(map);
        });
      }

      window.onload = initMap;
